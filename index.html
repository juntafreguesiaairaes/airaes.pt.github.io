<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <!-- O segredo para telemóvel está nesta meta tag -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> 
  <title>airaes.pt</title> 
  <link rel="shortcut icon" type="image/png" href="/favicon.png""")/>> 

  <style>
    /* Reset total do documento */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden; /* Impede o scroll duplo */
      background-color: #ffffff;
    }

    /* Contentor que serve de moldura fixa */
    .wix-frame-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      z-index: 9999;
    }

    /* Iframe com ajuste forçado de largura */
    .wix-iframe {
      position: absolute;
      /* Aplica o corte de 50px no topo */
      top: -50px; 
      left: 0;
      
      /* Força a largura a ser 100% do ecrã sem zoom out */
      width: 100%;
      min-width: 100%;
      
      /* Altura compensada para o corte de 50px topo + 10px fundo */
      height: calc(100% + 60px);
      
      border: none;
      margin: 0;
      padding: 0;
    }
  </style>
</head>
<body>

  <div class="wix-frame-wrapper">
    <iframe 
      src="https://jfairaes.wixsite.com" 
      class="wix-iframe"
      id="wixSite"
      allowfullscreen>
    </iframe>
  </div>

</body>
</html>
